# ArchiveBox — self-hosted web archive (snapshots pages to HTML/PDF/screenshot/WARC).
# https://github.com/ArchiveBox/ArchiveBox/wiki/Docker#docker-compose
#
# First-run setup (creates the admin user, run once):
#   docker compose -f compose.all.yml run archivebox init
#   # or set ADMIN_USERNAME / ADMIN_PASSWORD below to auto-create on first boot
# Then bring it up and open http://archivebox.homelab (proxied by Caddy).
#
# Add URLs:
#   docker compose -f compose.all.yml run archivebox add 'https://example.com'
#   docker compose -f compose.all.yml run -T archivebox add < ~/bookmarks.txt
#
# Addons in the upstream compose (Cloudflare Tunnel, Traefik, noVNC, WireGuard,
# ChangeDetection) are intentionally omitted — ingress is handled by Caddy and the
# host already runs Pi-hole for *.homelab DNS.

services:
  archivebox:
    image: archivebox/archivebox:dev
    container_name: archivebox
    restart: unless-stopped
    ports:
      - "8010:8000"   # host 8010 — tubearchivist already uses 8000 (also proxied by Caddy at archivebox.homelab)
    volumes:
      - ~/docker-volumes/archivebox:/data
    environment:
      - ADMIN_USERNAME=admin              # auto-creates the admin user on first run
      - ADMIN_PASSWORD=${ARCHIVEBOX_ADMIN_PASSWORD}   # set in docker/.env
      # subdomain mode: serves admin./web./api./snap-*.<base> on separate origins, so
      # archived content is isolated from the admin session (kills the shared-origin
      # warning banner) and full JS replay works. ArchiveBox routes every subdomain on
      # its single listener by Host header, so the base host just needs wildcard DNS.
      - SERVER_SECURITY_MODE=safe-subdomains-fullreplay
      #
      # BASE_URL — the base host the admin./web./api./snap-*. subdomains hang off of.
      # LOCAL (this Mac): macOS auto-resolves *.localhost -> 127.0.0.1, so point it at
      #   the published port and open http://archivebox.localhost:8010 — no Caddy needed.
      # HOMELAB host: comment the line below and uncomment the archivebox.homelab one,
      #   which needs the *.archivebox.homelab wildcard in Pi-hole dnsmasq + the wildcard
      #   Caddy site block (both already committed).
      - BASE_URL=http://archivebox.localhost:8010
      # - BASE_URL=http://archivebox.homelab
      - PUBLIC_ADD_VIEW=False             # set True to let anyone submit URLs to archive
      - TZ=${TZ}
    shm_size: "1gb"                       # Chrome runs more efficiently with a larger shared-memory pool
    networks:
      - main-network
